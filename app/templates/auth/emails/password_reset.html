<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password reset</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; line-height: 1.5; color: #111;">
  <p>{{ _('A password reset was requested for your TimeTracker account.') }}</p>
  <p>
    <a href="{{ reset_url }}" style="display:inline-block;padding:10px 14px;background:#2563eb;color:#fff;text-decoration:none;border-radius:6px;">
      {{ _('Reset password') }}
    </a>
  </p>
  <p style="font-size: 12px; color: #555;">
    {{ _('If the button does not work, copy and paste this link into your browser:') }}<br>
    <span style="word-break: break-all;">{{ reset_url }}</span>
  </p>
  <p style="font-size: 12px; color: #555;">
    {{ _('If you did not request this, you can ignore this email.') }}
  </p>
</body>
</html>
